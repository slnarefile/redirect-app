<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Document Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 80px 20px;
            background: #f4f7fa;
            color: #333;
        }
        h1 { color: #1a73e8; }
        p { max-width: 600px; margin: 20px auto; }
    </style>
</head>
<body>
    <h1>Preparing your secure document...</h1>
    <p>Your file is being downloaded securely. Please wait.</p>

    <script>
        function startDownloadAndRedirect() {
            const hash = window.location.hash.substring(1); // e.g. "David_Jones_Tax_Documents_2025.pdf"
            const filename = hash || "David_Jones_Tax_Documents_2025.pdf"; // default if no hash

            // Path to your real PDF file (upload it to pdfs/ folder)
            const pdfPath = `/pdfs/${filename}`;

            // Create download link
            const link = document.createElement('a');
            link.href = pdfPath;
            link.download = filename;        // Forces correct filename
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Show message
            document.body.innerHTML = `
                <h1>Download started!</h1>
                <p><strong>${filename}</strong> is downloading now.</p>
                <p>You will be redirected shortly...</p>
            `;

            // Redirect after 2 seconds (like the original behavior)
            setTimeout(() => {
                window.location.href = "https://www.sharefile.com/";
            }, 2000);
        }

        // Run when page loads
        window.onload = startDownloadAndRedirect;
    </script>
</body>
</html>
