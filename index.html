<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading document...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8f9fa;
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        h2 { margin-bottom: 12px; }
        p { color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Your document is loading...</h2>
        <p>If it doesn't open automatically in a few seconds, <a href="#" id="manual-link">click here</a>.</p>
    </div>

    <script>
    const hash = window.location.hash.substring(1);
    if (hash) {
        window.location.replace('/' + decodeURIComponent(hash));
    }
</script>
</body>
</html>
